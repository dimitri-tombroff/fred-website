<!-- Custom head -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: true,
    theme: "neutral"
  });
</script>

<style>
/* Compact hero spacing */
.section.home-compact { padding-top: 1rem; padding-bottom: 1rem; }

/* Center alignment for hero text */
.home-hero { text-align: center; }
.home-hero img { display:block; margin:0 auto 10px auto; }
.home-hero h1 { margin-bottom: .5rem; }
.home-hero .lead { margin-bottom: .75rem; }

/* Slim right gallery, pulled closer */
.home-mini { max-width: 300px; padding-left: 0.5rem; } /* reduce spacing */
.home-mini .fred-mini-wrapper { max-width: 100%; margin-top: 0; }
.home-mini .fred-mini-grid {
  gap: 6px;
  grid-template-columns: repeat(3, 1fr);
  justify-items: center;
}
.home-mini .mini-tile {
  width: 100%;
  max-width: 90px;
  aspect-ratio: 16/10;
}
.home-mini .mini-tile img { object-fit: cover; }

/* Responsive tweak */
@media (max-width: 991.98px) {
  .home-mini { max-width: none; margin-top: 1rem; }
  .home-mini .fred-mini-grid {
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  }
}
</style>
